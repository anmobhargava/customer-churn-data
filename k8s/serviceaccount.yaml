apiVersion: v1
kind: Namespace
metadata:
  name: churn-model

---
apiVersion: v1
kind: Secret
metadata:
  name: aws-secret
  namespace: churn-model
  annotations:
    serving.kserve.io/s3-endpoint: s3.amazonaws.com
    serving.kserve.io/s3-usehttps: "1"
    serving.kserve.io/s3-region: us-east-1
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa
  namespace: churn-model
secrets:
  - name: aws-secret